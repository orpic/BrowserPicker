name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## BrowserPicker v${{ steps.version.outputs.VERSION }}

            ### What's New
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Installation
            1. Download **BrowserPicker-${{ steps.version.outputs.VERSION }}.dmg** below
            2. Open the DMG and drag BrowserPicker to Applications
            3. Launch BrowserPicker
            4. If macOS shows an "unidentified developer" warning, right-click the app and select **Open**
            5. Set as default browser in System Settings > Desktop & Dock

            ### Note
            The DMG is built and uploaded locally (code signed with Apple ID).
            It is not notarized, so you may need to right-click > Open on first launch.
